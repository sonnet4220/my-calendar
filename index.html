<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 캘린더 대시보드</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --main-pink: #dca8bd; --bg-pink: #fdf8f9; --border-pink: #ebd5de; }
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-pink); color: #4a4a4a; min-height: 100vh; }
        .dashboard-container { display: flex; flex-direction: column; padding: 10px; gap: 15px; box-sizing: border-box; width: 100%; }

        @media (min-width: 1024px) {
            .dashboard-container { flex-direction: row; height: 100vh; padding: 20px; overflow: hidden; }
            .left-panel { flex: 1; } .center-panel { flex: 2.8; } .right-panel { flex: 1.5; }
            body { overflow: hidden; }
            .center-panel { min-height: 0 !important; } /* PC에서는 원래대로 */
        }

        .panel { background: #fff; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(200, 180, 185, 0.12); display: flex; flex-direction: column; width: 100%; box-sizing: border-box; min-height: 0; }
        
        /* 🔥 모바일 달력 증발 방지 철근 콘크리트! (패널 자체가 쪼그라들지 않게 방어) */
        .center-panel { min-height: 550px; }

        h2 { font-size: 18px; margin: 0 0 10px 0; color: #a87b8d; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        
        input[type="text"], textarea, input[type="month"] { padding: 10px; border: 1px solid var(--border-pink); border-radius: 8px; width: 100%; box-sizing: border-box; background: #fffafb; font-size: 14px; margin-bottom: 8px; font-family: inherit; }
        button { padding: 12px; background: var(--main-pink); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; }

        /* 🔥 달력 고정 비책 2: 100% 대신 사방으로 쫙 당겨서 고정! */
        .calendar-wrapper { flex: 1; position: relative; border: 1px solid #f4e8ec; border-radius: 12px; overflow: hidden; background: #fff; min-height: 450px; }
        #calendar { position: absolute; top: 0; bottom: 0; left: 0; right: 0; } /* 절대 좌표로 꽉 채움! 모바일 증발 완벽 해결 */
        
        .fc-daygrid-day-frame { height: 100% !important; min-height: 80px !important; display: flex !important; flex-direction: column; cursor: pointer; }
        .fc-daygrid-day-events { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0 !important; }
        .thumb-box { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-pink); pointer-events: none; }
        .cell-img { width: 100%; height: 100%; object-fit: cover; }
        .cell-letter { width: 40px; height: 40px; background: #fff0f5; color: #d16b8b; display: flex; justify-content: center; align-items: center; font-weight: 800; border-radius: 8px; font-size: 14px; }

        .header-tools { display: flex; gap: 6px; }
        .tool-btn { background: #fffafb; border: 1px solid var(--border-pink); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
        
        .noti-dropdown { position: absolute; top: 45px; right: 0; width: 280px; max-height: 400px; background: #fff; border: 1px solid var(--border-pink); border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: none; z-index: 9999; overflow-y: auto; }
        
        #leftRecordsArea { flex: 1; overflow-y: auto; padding-right: 5px; }
        #leftRecordsArea::-webkit-scrollbar, .noti-dropdown::-webkit-scrollbar, #recordDetailArea::-webkit-scrollbar { width: 6px; }
        #leftRecordsArea::-webkit-scrollbar-thumb, .noti-dropdown::-webkit-scrollbar-thumb, #recordDetailArea::-webkit-scrollbar-thumb { background: #ebd5de; border-radius: 3px; }

        .left-card { border: 1px solid var(--border-pink); border-radius: 12px; margin-bottom: 10px; cursor: pointer; overflow: hidden; background: #fff; transition: transform 0.2s; }
        .left-card:hover { transform: translateY(-2px); border-color: #c993a8; }
        .left-card-img { width: 100%; height: 100px; object-fit: cover; }
        
        #recordDetailArea { flex: 1; border: 1.5px dashed var(--border-pink); border-radius: 15px; padding: 15px; overflow-y: auto; background: #fffcfd; min-height: 250px; position: relative; }
        
        .action-btn-group { position: absolute; top: 15px; right: 15px; display: flex; gap: 6px; z-index: 10; }
        .action-btn { border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; color: white; width: auto; }
        .edit-btn { background: #74b9ff; }
        .edit-btn:hover { background: #0984e3; }
        .delete-btn { background: #ff7675; }
        .delete-btn:hover { background: #d63031; }
    </style>
</head>
<body>

    <div id="toastNotification" style="position: fixed; top: 20px; right: 20px; background: var(--main-pink); color: white; padding: 12px 20px; border-radius: 10px; z-index: 10001; opacity: 0; transition: 0.4s; pointer-events: none; font-weight: 600;">알림</div>

    <div class="dashboard-container">
        <div class="panel center-panel">
            <h2>
                <div style="display:flex; align-items:center; gap:8px;">📅 캘린더 <input type="month" id="monthPicker" style="width:auto; padding:3px; font-size:12px; margin:0;"></div>
                <div style="display:flex; gap:6px; position:relative;">
                    <div class="tool-btn" id="backupBtn">💾 백업</div>
                    <div class="tool-btn" id="bellBtn">🔔<div id="notiBadge" style="position:absolute; top:0; right:0; width:8px; height:8px; background:#ff7675; border-radius:50%; display:none;"></div></div>
                    <div class="noti-dropdown" id="notiDropdown"><div id="notiListArea"></div></div>
                </div>
            </h2>
            <div class="calendar-wrapper"><div id="calendar"></div></div>
        </div>

        <div class="panel left-panel">
            <h2><span id="leftPanelTitle">📜 피드</span> <button id="showAllBtn" style="width:auto; padding:4px 8px; font-size:11px;">전체</button></h2>
            <div id="leftRecordsArea"></div>
        </div>

        <div class="panel right-panel">
            <h2>✍️ 기록하기</h2>
            <p id="selectedDateText" style="color:var(--main-pink); font-weight:700; margin-bottom:8px;">📍 날짜를 선택해 주세요.</p>
            <div style="display:flex; gap:5px;"><input type="text" id="titleInput" placeholder="제목"><input type="text" id="authorInput" placeholder="이름" style="width:80px;"></div>
            <input type="text" id="subtitleInput" placeholder="소제목 (선택사항)">
            <textarea id="textContent" rows="2" placeholder="내용을 입력하세요..."></textarea>
            <input type="file" id="imageUpload" accept="image/*" multiple style="font-size:11px; margin-bottom:8px; width:100%;">
            <button id="saveBtn" disabled>날짜 선택 후 저장</button>
            <hr style="border:0.5px solid var(--border-pink); margin:15px 0;">
            <div id="recordDetailArea"><p style="text-align:center; color:#aaa; margin-top:50px;">날짜를 누르거나 피드에서 기록을 선택하세요.</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgd-IVsQQuvVBbq3edCuvJZaUIvVEjl08",
            authDomain: "calendar-project-7e1ce.firebaseapp.com",
            projectId: "calendar-project-7e1ce",
            storageBucket: "calendar-project-7e1ce.firebasestorage.app",
            messagingSenderId: "921887406990",
            appId: "1:921887406990:web:0bb6c93cf7f4ea549902df"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 🔥 대감의 완벽한 앱스 스크립트 주소 그대로 유지!
        const GAS_URL = "https://script.google.com/macros/s/AKfycby3bARyPmy1oNdNaqLXjUcxQYgrKFBMdvYB4fKwTtYfWPqBFq_nbOX-tHcjfoolJrsFdA/exec";

        let calendar; 
        let currentSelectedDate = null; 
        window.allRecords = []; 
        let isInitialLoad = true;
        
        let editingRecordId = null;
        let originalImages = [];

        function selectDate(d) {
            currentSelectedDate = d;
            document.getElementById('selectedDateText').innerText = `📍 입력 날짜: ${d}`;
            
            const b = document.getElementById('saveBtn');
            b.disabled = false; 
            
            if (!editingRecordId) {
                b.innerText = '저장하기';
                b.style.background = 'var(--main-pink)';
            }
            renderLeftPanel(d);
        }

        document.addEventListener('DOMContentLoaded', () => {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'ko',
                height: '100%', // 사방향 absolute 좌표와 결합되어 모바일에서도 완벽하게 높이가 확보됩니다.
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                dateClick: (i) => {
                    editingRecordId = null;
                    document.getElementById('titleInput').value=''; document.getElementById('subtitleInput').value=''; document.getElementById('textContent').value='';
                    selectDate(i.dateStr);
                },
                eventClick: (i) => { selectDate(i.event.startStr); i.jsEvent.preventDefault(); },
                eventContent: (arg) => {
                    let img = arg.event.extendedProps.imageUrl;
                    return { html: img ? `<div class="thumb-box"><img src="${img}" class="cell-img"></div>` : `<div class="cell-letter">${arg.event.title.charAt(0)}</div>` };
                },
                datesSet: (i) => { let d = i.view.currentStart; document.getElementById('monthPicker').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
            });
            calendar.render();

            document.getElementById('monthPicker').onchange = (e) => { if(e.target.value) calendar.gotoDate(e.target.value + '-01'); };
            document.getElementById('showAllBtn').onclick = () => renderLeftPanel(null);
            document.getElementById('bellBtn').onclick = (e) => { 
                const d = document.getElementById('notiDropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block';
                document.getElementById('notiBadge').style.display = 'none'; e.stopPropagation();
            };
            document.getElementById('backupBtn').onclick = () => backupData();

            onSnapshot(query(collection(db, "records"), orderBy("timestamp", "asc")), (snap) => {
                window.allRecords = []; calendar.removeAllEvents();
                snap.forEach(d => {
                    const data = d.data(); data.id = d.id; window.allRecords.push(data);
                    calendar.addEvent({ title: data.title, start: data.date, allDay: true, extendedProps: { imageUrl: data.images?.[0] } });
                });
                renderNoti();
                if (!isInitialLoad) { document.getElementById('notiBadge').style.display = 'block'; }
                isInitialLoad = false;
                renderLeftPanel(currentSelectedDate);
                if (window.currentSelectedId) window.selectRecord(window.currentSelectedId);
            });
        });

        function renderLeftPanel(fDate) {
            const area = document.getElementById('leftRecordsArea');
            let filtered = fDate ? window.allRecords.filter(r => r.date === fDate) : [...window.allRecords].sort((a,b)=>b.timestamp - a.timestamp);
            document.getElementById('leftPanelTitle').innerText = fDate ? `📌 ${fDate}` : `📜 피드`;
            
            if(!filtered.length) { area.innerHTML = '<p style="text-align:center; color:#aaa; font-size:12px; padding: 20px 0;">기록이 없습니다.</p>'; return; }
            area.innerHTML = filtered.map(r => `
                <div class="left-card" onclick="selectRecord('${r.id}')">
                    ${r.images?.[0] ? `<img src="${r.images[0]}" class="left-card-img">` : '<div style="height:40px; background:#fffafb;"></div>'}
                    <div style="padding:10px;"><strong>${r.title}</strong><br><small style="color:#999;">${r.date}</small></div>
                </div>
            `).join('');
        }

        window.selectRecord = (rid) => {
            const r = window.allRecords.find(x => x.id === rid); if(!r) return;
            window.currentSelectedId = rid;
            
            let h = `<div style="position:relative; padding-top: 5px;">
                <div class="action-btn-group">
                    <button class="action-btn edit-btn" onclick="editRecord('${r.id}')">수정</button>
                    <button class="action-btn delete-btn" onclick="deleteRecord('${r.id}')">삭제</button>
                </div>
                <h3 style="margin:0 0 5px 0; color:#8e5c70; padding-right:90px;">${r.title}</h3>
                ${r.subtitle?`<h5 style="color:#a87b8d; margin:0 0 10px 0;">${r.subtitle}</h5>`:''}
                <div style="margin-bottom:15px;"><small style="color:#999;">✍️ ${r.author} | 📅 ${r.date}</small></div>
                <p style="white-space:pre-wrap; line-height:1.7; color:#444; margin-bottom:20px;">${r.text}</p>`;
            
            if(r.images) h += r.images.map(img => `<img src="${img}" style="width:100%; border-radius:12px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">`).join('');
            
            h += `<hr style="border:0.5px solid #eee; margin:20px 0;"><small style="font-weight:bold; color:#8e5c70;">💬 댓글</small>
                <div style="margin-top:10px;">${(r.comments||[]).map(c=>`<div style="background:#fdfafb; padding:10px; border-radius:10px; margin-bottom:8px; border:1px solid #f4e8ec;"><small><strong>${c.author}</strong></small><p style="margin:4px 0 0 0; font-size:13px;">${c.text}</p></div>`).join('')}</div>
                <div style="display:flex; gap:8px; margin-top:15px;"><input type="text" id="cA_${rid}" placeholder="이름" style="width:70px; margin:0;"><input type="text" id="cT_${rid}" placeholder="댓글 입력..." style="flex:1; margin:0;"><button onclick="addComment('${rid}')" style="width:auto; padding:6px 14px; background:var(--main-pink); border:none; border-radius:8px; color:white; font-size:13px;">등록</button></div></div>`;
            document.getElementById('recordDetailArea').innerHTML = h;
        };

        window.editRecord = (rid) => {
            const r = window.allRecords.find(x => x.id === rid); if(!r) return;
            
            editingRecordId = rid;
            originalImages = r.images || []; 

            document.getElementById('titleInput').value = r.title;
            document.getElementById('subtitleInput').value = r.subtitle || '';
            document.getElementById('authorInput').value = r.author;
            document.getElementById('textContent').value = r.text;
            
            selectDate(r.date); 
            calendar.gotoDate(r.date);

            const btn = document.getElementById('saveBtn');
            btn.innerText = '수정하기';
            btn.style.background = '#8e5c70'; 
            
            const t = document.getElementById('toastNotification');
            t.innerText = "✍️ 수정 모드: 위쪽 칸에서 내용을 수정하세요!"; 
            t.style.opacity = "1"; setTimeout(() => { t.style.opacity = "0"; }, 3000);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.addComment = async (rid) => {
            const a = document.getElementById(`cA_${rid}`).value; const t = document.getElementById(`cT_${rid}`).value;
            if(!a || !t) return;
            await updateDoc(doc(db, "records", rid), { comments: arrayUnion({ author:a, text:t, timestamp:Date.now() }) });
        };
        window.deleteRecord = async (rid) => { if(confirm('이 기록을 정말 삭제하시겠습니까?')) await deleteDoc(doc(db, "records", rid)); };

        function renderNoti() {
            let l = []; window.allRecords.forEach(r => {
                l.push({ type:'글', id:r.id, date:r.date, title:r.title, ts:r.timestamp });
                (r.comments||[]).forEach(c => l.push({ type:'댓글', id:r.id, date:r.date, title:c.text, ts:c.timestamp }));
            });
            l.sort((a,b)=>b.ts - a.ts);
            
            document.getElementById('notiListArea').innerHTML = l.map(i => `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="jumpTo('${i.id}', '${i.date}')"><small>${i.type} ${i.date}</small><br><span style="font-size:12px;">${i.title}</span></div>`).join('');
        }
        
        window.jumpTo = (id, d) => { document.getElementById('notiDropdown').style.display='none'; calendar.gotoDate(d); selectDate(d); window.selectRecord(id); };

        document.getElementById('saveBtn').onclick = async () => {
            const t = document.getElementById('titleInput').value; const s = document.getElementById('subtitleInput').value; 
            const a = document.getElementById('authorInput').value; const txt = document.getElementById('textContent').value; const f = document.getElementById('imageUpload');
            if(!t || !a || !txt) return;
            
            const btn = document.getElementById('saveBtn'); 
            btn.disabled = true; btn.innerText = editingRecordId ? '수정 중...' : '저장 중...';
            
            try {
                let urls = [...originalImages]; 
                
                if (f.files.length > 0) {
                    urls = []; 
                    for(let file of f.files) {
                        const comp = await imageCompression(file, { maxSizeMB: 0.5, maxWidthOrHeight: 1024 });
                        const fileName = Date.now() + '_' + comp.name;
                        const sRef = ref(storage, 'images/' + fileName);
                        await uploadBytes(sRef, comp); 
                        const downloadUrl = await getDownloadURL(sRef);
                        urls.push(downloadUrl);

                        // GAS로 무조건 배달 쏩니다!
                        fetch(GAS_URL, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "text/plain" },
                            body: JSON.stringify({ url: downloadUrl, name: `${currentSelectedDate}_${t}_${fileName}` })
                        }).catch(e => console.log("드라이브 전송 실패:", e));
                    }
                }

                if (editingRecordId) {
                    await updateDoc(doc(db, "records", editingRecordId), { 
                        date: currentSelectedDate, title: t, subtitle: s, author: a, text: txt, images: urls
                    });
                    editingRecordId = null; 
                    originalImages = [];
                } else {
                    await addDoc(collection(db, "records"), { 
                        date: currentSelectedDate, title: t, subtitle: s, author: a, text: txt, images: urls, timestamp: Date.now(), comments: [] 
                    });
                }

                document.getElementById('titleInput').value=''; document.getElementById('subtitleInput').value=''; document.getElementById('textContent').value=''; f.value='';
                btn.innerText = '저장하기';
                btn.style.background = 'var(--main-pink)';
                
            } catch(e) { console.error(e); } finally { btn.disabled = false; }
        };

        async function backupData() {
            if(!window.allRecords.length) return;
            const zip = new JSZip(); const imgF = zip.folder("images");
            let csv = "\ufeff날짜,제목,소제목,작성자,본문\n";
            for(let r of window.allRecords) {
                csv += `"${r.date}","${r.title}","${r.subtitle||''}","${r.author}","${r.text.replace(/"/g, '""')}"\n`;
                if(r.images) { for(let i=0; i<r.images.length; i++) {
                    try { const res = await fetch(r.images[i]); const b = await res.blob(); imgF.file(`${r.date}_${r.title}_(${i+1}).jpg`, b); } catch(e){}
                }}
            }
            zip.file("backup.csv", csv);
            zip.generateAsync({type:"blob"}).then(c => saveAs(c, `backup_${new Date().toISOString().slice(0,10)}.zip`));
        }
    </script>
</body>
</html>
