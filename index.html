<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 캘린더 대시보드</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif; font-size: 14px; 
            background-color: #fdf8f9; color: #4a4a4a;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }
        .dashboard-container {
            display: flex; flex-direction: column; /* 기본적으로 위아래로 쌓임 (모바일 우선) */
            padding: 10px; box-sizing: border-box; gap: 15px; 
            min-height: 100vh;
        }
        
        /* 큰 화면(PC)일 때만 옆으로 나열하옵니다 */
        @media (min-width: 1024px) {
            .dashboard-container { flex-direction: row; height: 100vh; padding: 15px; }
            .left-panel { flex: 1; }
            .center-panel { flex: 2.5; }
            .right-panel { flex: 1.5; }
            .panel { height: 100%; }
        }

        .panel {
            padding: 15px; box-sizing: border-box; background-color: #ffffff; 
            border-radius: 16px; box-shadow: 0 4px 12px rgba(200, 180, 185, 0.15); 
            display: flex; flex-direction: column; overflow: hidden;
            width: 100%;
        }
        
        h2 { font-size: 18px; margin-top: 0; color: #a87b8d; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 5px; }
        
        input[type="text"], textarea {
            padding: 10px 12px; border: 1px solid #ebd5de; border-radius: 8px; width: 100%;
            box-sizing: border-box; outline: none; background-color: #fffafb; font-family: inherit; font-size: 14px;
        }
        button {
            padding: 12px 16px; background-color: #dca8bd; color: white; border: none;
            border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px;
            transition: background-color 0.2s; font-family: inherit; width: 100%;
        }
        input[type="month"] { font-family: inherit; font-size: 13px; padding: 6px; border: 1px solid #ebd5de; border-radius: 8px; }

        /* 🔥 달력 칸 채우기 최적화 */
        .calendar-wrapper { flex-grow: 1; margin-top: 10px; min-height: 450px; }
        #calendar { height: 100%; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #f4e8ec !important; }
        .fc-daygrid-day-frame { min-height: 70px !important; display: flex !important; flex-direction: column; padding: 1px; }
        .fc-daygrid-day-top { justify-content: center; padding: 1px 0; opacity: 0.8; font-size: 12px; }
        .fc-daygrid-day-events { flex-grow: 1; display: flex; align-items: center; }
        .fc-daygrid-event-harness { width: 100%; height: 100%; margin: 0 !important; }
        .fc-daygrid-event-harness:nth-child(n+2) { display: none !important; }
        .cell-fill-thumb { width: 100%; height: 100%; min-height: 40px; object-fit: cover; border-radius: 4px; display: block; }
        .cell-fill-text { width: 100%; height: 100%; min-height: 40px; background-color: #fff0f5; color: #d16b8b; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: 800; border-radius: 4px; }

        /* 🔥 알림 드롭다운 (모바일 대응) */
        .noti-dropdown {
            position: absolute; top: 50px; right: 0; width: 280px; max-height: 350px;
            background: #ffffff; border: 1px solid #ebd5de; border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); overflow-y: auto; z-index: 9000;
            display: none; flex-direction: column;
        }
        @media (max-width: 480px) {
            .noti-dropdown { right: -50px; width: 260px; } /* 모바일에서 살짝 조정 */
        }
        .noti-item { padding: 10px; border-bottom: 1px solid #fcf0f4; cursor: pointer; }
        .noti-desc { font-size: 12px; color: #444; }

        /* 좌측 카드 & 상세 뷰어 */
        .left-card { background: #fff; border: 1px solid #ebd5de; border-radius: 12px; margin-bottom: 10px; cursor: pointer; overflow: hidden; }
        .left-card-img { width: 100%; height: 100px; object-fit: cover; }
        .left-card-content { padding: 8px; }
        #recordDetailArea { flex-grow: 1; border: 1.5px dashed #ebd5de; border-radius: 12px; padding: 10px; background: #fffcfd; overflow-y: auto; min-height: 200px; }
    </style>
</head>
<body>

    <div id="toastNotification" style="position: fixed; top: 10px; right: 10px; background: rgba(168, 123, 141, 0.9); color: white; padding: 10px 15px; border-radius: 8px; font-size: 12px; transform: translateY(-100px); transition: 0.4s; z-index: 9999; opacity: 0; pointer-events: none;">알림</div>

    <div class="dashboard-container">
        <div class="panel center-panel">
            <h2>
                <div style="display: flex; align-items: center; gap: 5px;">📅 캘린더 <input type="month" id="monthPicker"></div>
                <div style="position: relative;" id="bellContainer">
                    <div id="bellBtn" style="cursor:pointer; font-size: 20px;">🔔<div id="notiBadge" style="position:absolute; top:0; right:0; width:10px; height:10px; background:#ff7675; border-radius:50%; display:none;"></div></div>
                    <div class="noti-dropdown" id="notiDropdown">
                        <div style="padding:10px; border-bottom:1px solid #eee; font-weight:bold; color:#8e5c70;">최근 소식</div>
                        <div id="notiListArea"></div>
                    </div>
                </div>
            </h2>
            <div class="calendar-wrapper"><div id="calendar"></div></div>
        </div>

        <div class="panel left-panel">
            <h2><span id="leftPanelTitle">📜 최근 피드</span> <button id="showAllBtn" style="width:auto; padding:5px 10px; font-size:11px;">전체보기</button></h2>
            <div id="leftRecordsArea" style="flex-grow:1; overflow-y:auto;"></div>
        </div>

        <div class="panel right-panel">
            <h2>✍️ 기록 남기기</h2>
            <p id="selectedDateText" style="color: #d16b8b; font-weight: 600; font-size: 13px; margin-bottom: 5px;">날짜를 선택해 주세요.</p>
            <div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" id="titleInput" placeholder="제목"><input type="text" id="authorInput" placeholder="작성자" style="width:80px;"></div>
            <textarea id="textContent" rows="2" placeholder="내용 입력..." style="margin-bottom:5px;"></textarea>
            <input type="file" id="imageUpload" accept="image/*" multiple style="font-size:12px; margin-bottom:5px; width:100%;">
            <button id="saveBtn" disabled>날짜 선택 필요</button>
            <hr style="border:0.5px solid #ebd5de; margin:15px 0;">
            <h2>👀 상세 보기</h2>
            <div id="recordDetailArea"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgd-IVsQQuvVBbq3edCuvJZaUIvVEjl08", 
            authDomain: "calendar-project-7e1ce.firebaseapp.com",
            projectId: "calendar-project-7e1ce",
            storageBucket: "calendar-project-7e1ce.firebasestorage.app",
            messagingSenderId: "921887406990",
            appId: "1:921887406990:web:0bb6c93cf7f4ea549902df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.firebaseDb = db; window.firebaseDeleteDoc = deleteDoc; window.firebaseDoc = doc;
        window.firebaseUpdateDoc = updateDoc; window.firebaseArrayUnion = arrayUnion;

        let calendar; let currentSelectedDate = null; window.allRecords = []; window.currentSelectedRecordId = null; let isInitialLoad = true;

        function showToast(msg) {
            const t = document.getElementById('toastNotification'); t.innerText = msg; t.style.transform = "translateY(0)"; t.style.opacity = "1";
            setTimeout(() => { t.style.transform = "translateY(-100px)"; t.style.opacity = "0"; }, 3000);
        }

        document.getElementById('bellBtn').onclick = (e) => {
            const d = document.getElementById('notiDropdown'); d.style.display = d.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('notiBadge').style.display = 'none'; e.stopPropagation();
        };
        document.onclick = (e) => { if(!document.getElementById('bellContainer').contains(e.target)) document.getElementById('notiDropdown').style.display = 'none'; };

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                locale: 'ko', selectable: true, height: 'auto', handleWindowResize: true,
                datesSet: (info) => { let d = info.view.currentStart; document.getElementById('monthPicker').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; },
                dateClick: (info) => {
                    currentSelectedDate = info.dateStr; document.getElementById('selectedDateText').innerText = "📍 입력 날짜: " + currentSelectedDate;
                    const b = document.getElementById('saveBtn'); b.disabled = false; b.innerText = '저장하기'; b.style.background = '#dca8bd';
                    renderLeftPanel(currentSelectedDate);
                },
                eventContent: (arg) => {
                    let img = arg.event.extendedProps.imageUrl;
                    return { html: img ? `<img src="${img}" class="cell-fill-thumb">` : `<div class="cell-fill-text">${arg.event.title.charAt(0)}</div>` };
                }
            });
            calendar.render();

            document.getElementById('monthPicker').onchange = (e) => { if(e.target.value) calendar.gotoDate(e.target.value + '-01'); };
            document.getElementById('showAllBtn').onclick = () => renderLeftPanel(null);

            onSnapshot(query(collection(db, "records"), orderBy("timestamp", "asc")), (snap) => {
                window.allRecords = []; calendar.removeAllEvents();
                snap.forEach(d => {
                    const data = d.data(); data.id = d.id; window.allRecords.push(data);
                    calendar.addEvent({ title: data.title, start: data.date, allDay: true, extendedProps: { imageUrl: data.images?.[0] } });
                });
                renderNotificationFeed();
                if (!isInitialLoad) { showToast("🔔 업데이트가 반영되었습니다!"); document.getElementById('notiBadge').style.display = 'block'; }
                isInitialLoad = false;
                renderLeftPanel(currentSelectedDate);
                if (window.currentSelectedRecordId) window.selectRecord(window.currentSelectedRecordId);
            });
        });

        function renderLeftPanel(fDate) {
            const area = document.getElementById('leftRecordsArea');
            let filtered = fDate ? window.allRecords.filter(r => r.date === fDate) : [...window.allRecords].sort((a,b)=>b.timestamp - a.timestamp);
            document.getElementById('leftPanelTitle').innerText = fDate ? `📌 ${fDate}` : "📜 최근 피드";
            if(!filtered.length) { area.innerHTML = '<p style="text-align:center; color:#aaa; font-size:12px; margin-top:20px;">기록이 없습니다.</p>'; return; }
            area.innerHTML = filtered.map(r => `
                <div class="left-card" onclick="selectRecord('${r.id}')">
                    ${r.images?.[0] ? `<img src="${r.images[0]}" class="left-card-img">` : '<div style="height:60px; background:#fff0f5;"></div>'}
                    <div class="left-card-content"><strong>${r.title}</strong><br><small>${r.date} | ${r.author}</small></div>
                </div>
            `).join('');
        }

        window.selectRecord = (rid) => {
            const r = window.allRecords.find(x => x.id === rid); if(!r) return;
            window.currentSelectedRecordId = rid;
            let html = `<div style="position:relative;"><button class="delete-btn" onclick="deleteRecord('${r.id}')">삭제</button>
                <h3>${r.title}</h3><small>${r.author} | ${r.date}</small><p style="white-space:pre-wrap; line-height:1.6;">${r.text}</p>`;
            if(r.images) html += r.images.map(img => `<img src="${img}" style="width:100%; border-radius:8px; margin-bottom:10px;">`).join('');
            html += `<hr><small>댓글</small><div style="margin-top:10px;">${(r.comments||[]).map(c=>`<div style="background:#f9f9f9; padding:8px; border-radius:5px; margin-bottom:5px;"><small><strong>${c.author}</strong>: ${c.text}</small></div>`).join('')}</div>
                <div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="cA_${r.id}" placeholder="이름" style="width:60px;"><input type="text" id="cT_${r.id}" placeholder="댓글..." style="flex:1;"><button onclick="addComment('${r.id}')" style="width:auto; padding:5px 10px;">🆗</button></div></div>`;
            document.getElementById('recordDetailArea').innerHTML = html;
        };

        window.addComment = async (rid) => {
            const a = document.getElementById(`cA_${rid}`).value; const t = document.getElementById(`cT_${rid}`).value;
            if(!a || !t) return;
            await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDb, "records", rid), { comments: window.firebaseArrayUnion({ author:a, text:t, timestamp:Date.now() }) });
        };

        window.deleteRecord = async (rid) => { if(confirm('삭제하시겠습니까?')) await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "records", rid)); };

        function renderNotificationFeed() {
            let list = [];
            window.allRecords.forEach(r => {
                list.push({ type:'record', id:r.id, date:r.date, title:r.title, ts:r.timestamp });
                (r.comments||[]).forEach(c => list.push({ type:'comment', id:r.id, date:r.date, title:c.text, ts:c.timestamp }));
            });
            list.sort((a,b)=>b.ts - a.ts);
            document.getElementById('notiListArea').innerHTML = list.slice(0,15).map(i => `
                <div class="noti-item" onclick="jumpTo('${i.id}', '${i.date}')">
                    <div class="noti-desc"><strong>${i.type==='record'?'[기록]':'[댓글]'}</strong> ${i.date}<br>${i.title}</div>
                </div>
            `).join('');
        }

        window.jumpTo = (id, d) => {
            document.getElementById('notiDropdown').style.display='none'; calendar.gotoDate(d);
            currentSelectedDate = d; document.getElementById('selectedDateText').innerText = "📍 입력 날짜: " + d;
            renderLeftPanel(d); window.selectRecord(id);
        };

        document.getElementById('saveBtn').onclick = async () => {
            const t = document.getElementById('titleInput').value; const a = document.getElementById('authorInput').value;
            const txt = document.getElementById('textContent').value; const f = document.getElementById('imageUpload');
            if(!t || !a || !txt) return;
            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = '업로드 중...';
            try {
                let urls = [];
                for(let file of f.files) {
                    const comp = await imageCompression(file, { maxSizeMB: 0.5, maxWidthOrHeight: 1024 });
                    const sRef = ref(storage, 'images/' + Date.now() + '_' + comp.name);
                    await uploadBytes(sRef, comp); urls.push(await getDownloadURL(sRef));
                }
                await addDoc(collection(db, "records"), { date: currentSelectedDate, title: t, author: a, text: txt, images: urls, timestamp: Date.now(), comments: [] });
                document.getElementById('titleInput').value=''; document.getElementById('textContent').value=''; f.value='';
            } catch(e) { console.error(e); } finally { btn.disabled = false; btn.innerText = '저장하기'; }
        };
    </script>
</body>
</html>
